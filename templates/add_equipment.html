{% extends "base.html" %}
{% block title %}Add Equipment — RentalDB{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">Add <span>Equipment</span></div>
    <div class="page-subtitle">Register a new rental item</div>
  </div>
  <a href="{{ url_for('equipment') }}" class="btn btn-secondary">← Back</a>
</div>

<!-- RUBRIC 1: Show new ID after successful insert -->
{% if new_id %}
<div class="card" style="margin-bottom:1.5rem; border-left:4px solid var(--success); background:rgba(108,161,85,0.06);">
  <p style="font-size:1.05rem; font-weight:700; color:#4A7339;">
    ✅ Equipment added successfully!
    &nbsp;|&nbsp; New Equipment ID: <span style="font-family:var(--font-display); font-size:1.3rem;">#{{ new_id }}</span>
  </p>
</div>
{% endif %}

<div class="card form-wrap">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group full">
        <label>Equipment Name</label>
        <input type="text" name="equip_name" placeholder="e.g. Canon EOS R5" required>
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" placeholder="e.g. Camera, Power Tool">
      </div>
      <div class="form-group">
        <label>Rent Price Per Day (₹)</label>
        <input type="number" step="0.01" name="rent_price" placeholder="e.g. 500.00" required>
      </div>
      <div class="form-group">
        <label>Condition</label>
        <select name="condition" required>
          <option value="">Select condition</option>
          <option>New</option>
          <option>Good</option>
          <option>Damaged</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status" required>
          <option value="">Select status</option>
          <option value="Available">Available</option>
          <option value="Rented">Rented</option>
          <option value="Maintenance">Maintenance</option>
        </select>
      </div>
      <div class="form-group">
        <label>Branch</label>
        <select name="branch_id" required>
          <option value="">Select branch</option>
          {% for b in branches %}
          <option value="{{ b.Branch_ID }}">{{ b.Branch_Name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Parent Equipment (optional)</label>
        <select name="parent_id">
          <option value="">None</option>
          {% for e in equip_list %}
          <option value="{{ e.Equip_ID }}">#{{ e.Equip_ID }} — {{ e.Equip_Name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div style="margin-top:1.5rem; display:flex; gap:0.75rem;">
      <button type="submit" class="btn btn-primary">Add Equipment</button>
      <a href="{{ url_for('equipment') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
