{% extends "base.html" %}
{% block title %}Login — RentalDB{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-logo">
    <h1>Rental<span>DB</span></h1>
    <p style="color:var(--text-muted); font-size:0.95rem; margin-top:0.4rem;">Sign in to your account</p>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-group" style="margin-bottom:1rem;">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Login</button>
    </form>
    <p style="margin-top:1rem; text-align:center; font-size:0.88rem; color:var(--text-muted);">
      New customer? <a href="{{ url_for('register_customer') }}" style="color:var(--accent); font-weight:700;">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
