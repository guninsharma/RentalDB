{% extends "base.html" %}
{% block title %}Record Payment — RentalDB{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">Record <span>Payment</span></div>
    <div class="page-subtitle">Process payment for a rental</div>
  </div>
  <a href="{{ url_for('payments') }}" class="btn btn-secondary">← Back</a>
</div>

{% if new_id %}
<div class="card" style="margin-bottom:1.5rem; border-left:4px solid var(--success); background:rgba(108,161,85,0.06);">
  <p style="font-size:1.05rem; font-weight:700; color:#4A7339;">
    ✅ Payment recorded!
    &nbsp;|&nbsp; New Payment ID: <span style="font-family:var(--font-display); font-size:1.3rem;">#{{ new_id }}</span>
  </p>
</div>
{% endif %}

<div class="card form-wrap">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group full">
        <label>Rental</label>
        <select name="rental_id" required>
          <option value="">Select rental</option>
          {% for r in rentals %}
          <option value="{{ r.Rental_ID }}" {% if r.Rental_ID|string == selected_rental_id|string %}selected{% endif %}>
            #{{ r.Rental_ID }} — {{ r.Customer_Name }} — {{ r.Equip_Name }} — ₹{{ r.Total_Amount }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Payment Date</label>
        <input type="date" name="payment_date" required>
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" step="0.01" name="amount" placeholder="e.g. 4500.00" required>
      </div>
      <div class="form-group">
        <label>Payment Mode</label>
        <select name="mode" required>
          <option value="">Select mode</option>
          <option>Card</option>
          <option>Cash</option>
          <option>UPI</option>
        </select>
      </div>
      <div class="form-group">
        <label>Payment Status</label>
        <select name="status" required>
          <option value="">Select status</option>
          <option>Completed</option>
          <option>Pending</option>
          <option>Failed</option>
        </select>
      </div>
    </div>
    <div style="margin-top:1.5rem; display:flex; gap:0.75rem;">
      <button type="submit" class="btn btn-primary">Record Payment</button>
      <a href="{{ url_for('payments') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
