{% extends "base.html" %}
{% block title %}Edit Equipment — RentalDB{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">Edit <span>Equipment</span></div>
    <div class="page-subtitle">Update details for #{{ equip.Equip_ID }} — {{ equip.Equip_Name }}</div>
  </div>
  <a href="{{ url_for('equipment') }}" class="btn btn-secondary">← Back</a>
</div>

<div class="card form-wrap">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group full">
        <label>Equipment Name</label>
        <input type="text" name="equip_name" value="{{ equip.Equip_Name }}" required>
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" value="{{ equip.Category or '' }}">
      </div>
      <div class="form-group">
        <label>Rent Price Per Day (₹)</label>
        <input type="number" step="0.01" name="rent_price" value="{{ equip.Rent_Price_Per_Day }}" required>
      </div>
      <div class="form-group">
        <label>Condition</label>
        <select name="condition" required>
          <option value="">Select condition</option>
          <option {% if equip.Condition_State == 'New'     %}selected{% endif %}>New</option>
          <option {% if equip.Condition_State == 'Good'    %}selected{% endif %}>Good</option>
          <option {% if equip.Condition_State == 'Damaged' %}selected{% endif %}>Damaged</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status" required>
          <option value="Available"   {% if equip.Status == 'Available'   %}selected{% endif %}>Available</option>
          <option value="Rented"      {% if equip.Status == 'Rented'      %}selected{% endif %}>Rented</option>
          <option value="Maintenance" {% if equip.Status == 'Maintenance' %}selected{% endif %}>Maintenance</option>
        </select>
      </div>
      <div class="form-group">
        <label>Branch</label>
        <select name="branch_id" required>
          {% for b in branches %}
          <option value="{{ b.Branch_ID }}" {% if b.Branch_ID == equip.Branch_ID %}selected{% endif %}>{{ b.Branch_Name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div style="margin-top:1.5rem; display:flex; gap:0.75rem;">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('equipment') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
