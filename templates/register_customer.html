{% extends "base.html" %}
{% block title %}Register Customer — RentalDB{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">Register <span>Customer</span></div>
    <div class="page-subtitle">Add a new customer account</div>
  </div>
  <a href="{{ url_for('customers') }}" class="btn btn-secondary">← Back</a>
</div>

<!-- RUBRIC 1: Show new ID after successful insert -->
{% if new_id %}
<div class="card" style="margin-bottom:1.5rem; border-left:4px solid var(--success); background:rgba(108,161,85,0.06);">
  <p style="font-size:1.05rem; font-weight:700; color:#4A7339;">
    ✅ Customer registered successfully!
    &nbsp;|&nbsp; New Customer ID: <span style="font-family:var(--font-display); font-size:1.3rem;">#{{ new_id }}</span>
  </p>
</div>
{% endif %}

<div class="card form-wrap">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="first_name" placeholder="e.g. Ananya" required>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="last_name" placeholder="e.g. Sharma" required>
      </div>
      <div class="form-group full">
        <label>Email</label>
        <input type="email" name="email" placeholder="e.g. ananya@email.com" required>
      </div>
      <div class="form-group full">
        <label>Password</label>
        <input type="password" name="password" placeholder="Set a password" required>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phone" placeholder="e.g. 9876543210">
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" name="dob">
      </div>
      <div class="form-group full">
        <label>Address</label>
        <input type="text" name="address" placeholder="e.g. 12 MG Road, Bengaluru">
      </div>
    </div>
    <div style="margin-top:1.5rem; display:flex; gap:0.75rem;">
      <button type="submit" class="btn btn-primary">Register Customer</button>
      <a href="{{ url_for('customers') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
